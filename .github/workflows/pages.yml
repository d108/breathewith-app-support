# Publishes the Angular app to the gh-pages branch.
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build -- --base-href /breathewith-app-support/

      - name: Stage site files
        run: |
          set -euo pipefail
          mkdir -p _site
          cp -r dist/breathewith-app-support/browser/* _site/
          # Ensure 404.html exists for GH Pages
          cp _site/404/index.html _site/404.html
          # Legacy redirect support
          cp _site/privacy/index.html _site/privacy-policy.html
          touch _site/.nojekyll
          ls -la _site

      - name: Block disallowed attribution in published files
        run: |
          set -euo pipefail
          if grep -RIn --include='*.html' --include='*.js' -E -i \
            'made[[:space:]]+with[[:space:]]+cursor|built[[:space:]]+with[[:space:]]+cursor' _site; then
            echo "::error::Published HTML/JS must not contain disallowed tooling attribution."
            exit 1
          fi

      - name: Push to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site
          branch: gh-pages
          clean: true
          commit-message: "Deploy Angular support site"
          git-config-name: github-actions[bot]
          git-config-email: 41898282+github-actions[bot]@users.noreply.github.com
