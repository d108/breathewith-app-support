<!DOCTYPE html>
<html lang="en" data-theme="classic">
<head>
    <!-- Project Pages: set href to this site’s root so CSS/links work when 404 is shown for nested URLs. -->
    <base href="https://d108.github.io/breathewith-app-support/">
    <script>
    (function () {
        var choice = "classic";
        try {
            var K = "breathewith-theme";
            var raw = localStorage.getItem(K);
            if (raw === "system" || raw === "classic" || raw === "calm" || raw === "dark") {
                choice = raw;
            }
        } catch (e) {}
        var resolved = choice === "system"
            ? (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "calm")
            : choice;
        document.documentElement.setAttribute("data-theme", resolved);
    })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page not found — BreatheWith</title>
    <meta name="description" content="The page you requested is not available. Return to BreatheWith support.">
    <meta name="theme-color" content="#91c2bd" id="meta-theme-color">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>
<body>
    <header class="site-header site-header--compact">
        <div class="container header-inner">
            <div class="brand">
                <p class="eyebrow"><a href="index.html">BreatheWith</a></p>
                <h1>Page not found</h1>
                <p class="tagline">That link may be outdated or mistyped.</p>
            </div>
        </div>
    </header>
    <main class="container main-stack">
        <section class="not-found-card" aria-labelledby="not-found-heading">
            <h2 id="not-found-heading">What you can do</h2>
            <ul>
                <li>Go to the <a href="index.html">support home</a> for FAQs and contact.</li>
                <li>Open the <a href="privacy-policy.html">privacy policy</a> if that is what you needed.</li>
            </ul>
            <a href="index.html" class="button">Back to support</a>
        </section>
    </main>
    <footer class="site-footer">
        <div class="container footer-inner">
            <p>&copy; 2026 Daniel Zhang. All rights reserved.</p>
            <div class="theme-control">
                <label for="theme-select-404">Appearance</label>
                <select id="theme-select-404" class="theme-select" autocomplete="off">
                    <option value="system">System</option>
                    <option value="classic">Classic</option>
                    <option value="calm">Calm</option>
                    <option value="dark">Dark</option>
                </select>
            </div>
        </div>
    </footer>
    <script src="theme.js"></script>
</body>
</html>
